<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar: #171717;
  --bg: #212121;
  --surface: #2f2f2f;
  --surface2: #3a3a3a;
  --border: rgba(255,255,255,0.1);
  --text: #ececec;
  --muted: #8e8e8e;
  --accent: #10a37f;
  --radius: 12px;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--sidebar);
  display: flex;
  flex-direction: column;
  padding: 12px 8px;
  gap: 4px;
  overflow: hidden;
}

.sidebar-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 8px 10px;
}

.sidebar-logo {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.btn-new {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  transition: background 0.15s, color 0.15s;
}
.btn-new:hover { background: var(--surface); color: var(--text); }
.btn-new svg { width: 18px; height: 18px; }

.sidebar-label {
  font-size: 11px;
  color: var(--muted);
  padding: 8px 10px 4px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.chat-item {
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background 0.15s, color 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.chat-item:hover { background: var(--surface); color: var(--text); }
.chat-item.active { background: var(--surface); color: var(--text); }
.chat-item svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.6; }

.sidebar-spacer { flex: 1; }

.sidebar-bottom {
  border-top: 1px solid var(--border);
  padding-top: 10px;
}

.model-select-wrap {
  padding: 6px 8px;
}

.model-select {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  outline: none;
  cursor: pointer;
}
.model-select option { background: var(--sidebar); }

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.topbar-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0;
  display: flex;
  flex-direction: column;
  gap: 0;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 60px 20px;
  text-align: center;
  height: 100%;
}
.empty-logo {
  width: 48px;
  height: 48px;
  background: var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 6px;
}
.empty-logo svg { width: 26px; height: 26px; fill: #fff; }
.empty-title { font-size: 22px; font-weight: 600; color: var(--text); }
.empty-sub { font-size: 14px; color: var(--muted); max-width: 320px; line-height: 1.6; }

.msg-row {
  padding: 16px 20px;
  display: flex;
  gap: 16px;
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.msg-row.user { flex-direction: row-reverse; }

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
}
.avatar.ai {
  background: var(--accent);
}
.avatar.ai svg { width: 16px; height: 16px; fill: #fff; }
.avatar.user {
  background: #5436DA;
  color: #fff;
  font-size: 13px;
}

.msg-content {
  font-size: 14px;
  line-height: 1.75;
  color: var(--text);
  max-width: calc(100% - 48px);
}

.msg-row.user .msg-content {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 10px 16px;
}

.msg-content pre {
  background: #1a1a1a;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  font-size: 13px;
  overflow-x: auto;
  margin: 10px 0;
  font-family: 'Menlo', 'Courier New', monospace;
}
.msg-content code {
  background: rgba(255,255,255,0.08);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: 'Menlo', 'Courier New', monospace;
}
.msg-content pre code { background: none; padding: 0; }

.typing { display: flex; gap: 5px; align-items: center; padding: 6px 0; }
.typing span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }

/* INPUT AREA */
.input-area {
  padding: 12px 20px 20px;
  flex-shrink: 0;
}

.input-outer {
  max-width: 760px;
  margin: 0 auto;
}

.input-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 12px 12px 12px 18px;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  transition: border-color 0.2s;
}
.input-wrap:focus-within { border-color: rgba(255,255,255,0.25); }

#user-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  resize: none;
  max-height: 160px;
  overflow-y: auto;
  line-height: 1.6;
  padding: 2px 0;
}
#user-input::placeholder { color: var(--muted); }

.btn-send {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.1s;
}
.btn-send:hover { opacity: 0.85; }
.btn-send:active { transform: scale(0.93); }
.btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-send svg { width: 15px; height: 15px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

.input-hint { text-align: center; font-size: 11px; color: var(--muted); margin-top: 8px; opacity: 0.5; }

.error-bar {
  background: rgba(220,60,60,0.12);
  border: 1px solid rgba(220,60,60,0.25);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  color: #f87171;
  margin-bottom: 8px;
  display: none;
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-top">
    <span class="sidebar-logo">AI Chat</span>
    <button class="btn-new" onclick="newChat()" title="Chat baru">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </button>
  </div>

  <div class="sidebar-label">Riwayat</div>
  <div id="history-list"></div>

  <div class="sidebar-spacer"></div>

  <div class="sidebar-bottom">
    <div class="model-select-wrap">
      <select class="model-select" id="model-select" onchange="changeModel(this.value)">
        <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
        <option value="llama-3.1-8b-instant">Llama 3.1 8B (Cepat)</option>
        <option value="gemma2-9b-it">Gemma 2 9B</option>
        <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
      </select>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="topbar-title">Chat baru</span>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      </div>
      <div class="empty-title">Mau ngobrol apa?</div>
      <div class="empty-sub">Ketik pesan lo di bawah untuk mulai. Model aktif: <span id="active-model-label">Llama 3.3 70B</span></div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-outer">
      <div class="error-bar" id="error-bar"></div>
      <div class="input-wrap">
        <textarea id="user-input" placeholder="Kirim pesan..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="input-hint">Enter kirim · Shift+Enter baris baru</div>
    </div>
  </div>
</div>

<script>
// =============================================
// GANTI API KEY LO DI SINI
const apiKey = 'ISI_API_KEY_GROQ_DISINI';
// =============================================

const systemPrompt = 'Kamu adalah asisten AI yang membantu, cerdas, dan ramah. Jawab dalam Bahasa Indonesia kecuali jika diminta lain.';

let selectedModel = 'llama-3.3-70b-versatile';
let messages = [];
let isLoading = false;
let chatSessions = [];
let currentSessionId = null;

const modelLabels = {
  'llama-3.3-70b-versatile': 'Llama 3.3 70B',
  'llama-3.1-8b-instant': 'Llama 3.1 8B',
  'gemma2-9b-it': 'Gemma 2 9B',
  'mixtral-8x7b-32768': 'Mixtral 8x7B'
};

function changeModel(val) {
  selectedModel = val;
  document.getElementById('active-model-label').textContent = modelLabels[val];
}

function newChat() {
  if (messages.length > 0) {
    saveCurrentSession();
  }
  messages = [];
  currentSessionId = null;
  document.getElementById('topbar-title').textContent = 'Chat baru';
  document.getElementById('messages').innerHTML = `
    <div class="empty-state" id="empty-state">
      <div class="empty-logo">
        <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      </div>
      <div class="empty-title">Mau ngobrol apa?</div>
      <div class="empty-sub">Ketik pesan lo di bawah untuk mulai. Model aktif: <span id="active-model-label">${modelLabels[selectedModel]}</span></div>
    </div>`;
  document.getElementById('user-input').focus();
  renderHistory();
}

function saveCurrentSession() {
  if (messages.length === 0) return;
  const title = messages[0].content.substring(0, 40) + (messages[0].content.length > 40 ? '...' : '');
  if (currentSessionId) {
    const idx = chatSessions.findIndex(s => s.id === currentSessionId);
    if (idx !== -1) { chatSessions[idx].messages = [...messages]; return; }
  }
  currentSessionId = Date.now().toString();
  chatSessions.unshift({ id: currentSessionId, title, messages: [...messages] });
  if (chatSessions.length > 20) chatSessions = chatSessions.slice(0, 20);
}

function loadSession(id) {
  saveCurrentSession();
  const session = chatSessions.find(s => s.id === id);
  if (!session) return;
  currentSessionId = id;
  messages = [...session.messages];
  document.getElementById('topbar-title').textContent = session.title;
  const container = document.getElementById('messages');
  container.innerHTML = '';
  messages.forEach(m => appendMessage(m.role === 'user' ? 'user' : 'ai', m.content, false));
  renderHistory();
  container.scrollTop = container.scrollHeight;
}

function renderHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  chatSessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'chat-item' + (s.id === currentSessionId ? ' active' : '');
    div.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${s.title}`;
    div.onclick = () => loadSession(s.id);
    list.appendChild(div);
  });
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatMessage(text) {
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) => `<pre><code>${escapeHtml(c.trim())}</code></pre>`);
  text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function appendMessage(role, content, animate = true) {
  const container = document.getElementById('messages');
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  if (!animate) row.style.animation = 'none';

  const avatarInner = role === 'ai'
    ? `<svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>`
    : 'U';

  row.innerHTML = `
    <div class="avatar ${role}">${avatarInner}</div>
    <div class="msg-content">${formatMessage(content)}</div>`;
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('messages');
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  const row = document.createElement('div');
  row.className = 'msg-row ai'; row.id = 'typing-row';
  row.innerHTML = `
    <div class="avatar ai"><svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg></div>
    <div class="msg-content"><div class="typing"><span></span><span></span><span></span></div></div>`;
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-row');
  if (el) el.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = ''; input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('error-bar').style.display = 'none';

  messages.push({ role: 'user', content: text });
  appendMessage('user', text);

  if (messages.length === 1) {
    document.getElementById('topbar-title').textContent = text.substring(0, 40);
  }

  showTyping();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: selectedModel,
        max_tokens: 2048,
        messages: [
          { role: 'system', content: systemPrompt },
          ...messages
        ]
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || `Error ${res.status}`);

    const reply = data.choices[0].message.content;
    messages.push({ role: 'assistant', content: reply });
    removeTyping();
    appendMessage('ai', reply);
    saveCurrentSession();
    renderHistory();

  } catch (err) {
    removeTyping();
    const bar = document.getElementById('error-bar');
    bar.style.display = 'block';
    bar.textContent = '⚠ ' + err.message;
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('user-input').focus();
}
</script>
</body>
</html>
