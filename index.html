ergerak sangat cepat. Jika Anda bergerak mendekati kecepatan cahaya, waktu bagi Anda akan berjalan lebih lambat dibandingkan dengan orang yang diam.\n*   **Kontraksi Panjang (Length Contraction):** Objek yang bergerak sangat cepat akan memendek (dalam arah geraknya) dari perspektif pengamat yang diam.\n*   **Kesetaraan Massa-Energi:** Inilah rumus paling terkenal dari teori ini: **E = mc²**. Artinya, massa (m) dan energi (E) adalah dua sisi dari koin yang sama dan dapat saling bertukar. Massa mengandung sejumlah energi yang sangat besar (dikalikan dengan kuadrat kecepatan cahaya).\n\n### 2. Teori Relativitas Umum (1915)\nTeori ini memperluas prinsip relativitas untuk mencakup kerangka acuan yang dipercepat (seperti akibat gravitasi) dan pada dasarnya adalah **teori gravitasi baru** yang menggantikan teori gravitasi Newton.\n\n**Ide Utamanya:**\n*   **Ruang dan waktu** tidak terpisah; mereka menyatu dalam sebuah kain yang disebut **ruang-waktu (spacetime)**.\n*   **Gravitasi bukanlah gaya \"misterius\" yang menarik benda**, tetapi merupakan akibat dari **kelengkungan (curvature) ruang-waktu** oleh massa dan energi.\n\n**Analogi yang Berguna:**\nBayangkan ruang-waktu seperti sebuah lembaran karet yang elastis yang direntangkan. Jika Anda meletakkan bola bowling (mewakili massa besar seperti matahari) di tengahnya, lembaran itu akan melengkung. Kemudian, jika Anda menggulingkan sebuah kelereng (mewakili planet) di dekatnya, kelereng itu akan bergerak mengikuti kelengkungan yang dibuat oleh bola bowling. Itulah gravitasi—benda bergerak mengikuti lengkungan ruang-waktu.\n\n**Konsekuensi Penting:**\n*   **Pembelokan Cahaya:** Cahaya akan membelok ketika melewati medan gravitasi yang kuat.\n*   **Dilasi Waktu Gravitasi:** Waktu berjalan lebih lambat di medan gravitasi yang lebih kuat. (Inilah prinsip yang digunakan GPS satelit untuk koreksi waktu yang akurat).\n*   **Gelombang Gravitasi:** Riak dalam ruang-waktu yang dihasilkan oleh peristiwa dahsyat seperti penggabungan dua lubang hitam. (Dipastikan keberadaannya pada tahun 2015).\n\n### Ringkasan Singkat:\n\n| Aspek | Relativitas Khusus | Relativitas Umum |\n| :--- | :--- | :--- |\n| **Fokus** | Gerak dengan kecepatan konstan | Gravitasi & percepatan |\n| **Konsep Kunci** | Kecepatan cahaya konstan, E=mc² | Kelengkungan ruang-waktu |\n| **Efek** | Waktu melambat, panjang memendek | Pembelokan cahaya, waktu melambat dekat gravitasi |\n\n**Intinya:** Teori Relativitas mengajarkan bahwa pengalaman kita tentang ruang dan waktu bukanlah hal yang mutlak, tetapi **relatif** terhadap gerakan dan posisi kita dalam alam semesta. Teori ini telah terbukti sangat akurat dan menjadi dasar bagi banyak teknologi modern, dari GPS hingga penelitian kosmologi."}}}, {"name": "phis.json", "content": {"status": true, "author": "ridho", "result": {"status_code": 6, "status_description": "Tidak ada data (No available data)", "sends_to_harmful_sites": false, "installs_malicious_software": false, "is_phishing": false, "contains_malware": false, "uncommon_downloads": false, "last_modified": "1970-01-01T00:00:00.000Z", "scanned_url": "https://example-scam-site.com"}, "timestamp": "2026-05-25T17:43:05.692Z", "response_time": "1231ms", "creator": "xemoz", "attribution": "xemoz"}}, {"name": "playstore.json", "content": {"status": true, "result": {"total": 10, "query": "Baby Bus", "results": [{"package_id": "com.sinyee.babybus.taxi", "name": "Baby Panda&#39;s School Bus", "developer": "Panda&#39;s School Bus - Apps on Google Play\">", "rating": "4.5", "icon_url": "https://play-lh.googleusercontent.com/QA6Q40ZseGCrM4krzYJOQEln-VXKgnZ__ztqAh6HaHIdouz_9EoyVQyvhwt9x2SL4wo", "description": "3D school bus driving game for kids!", "play_store_url": "https://play.google.com/store/apps/details?id=com.sinyee.babybus.taxi"}, {"package_id": "com.sinyee.babybus.kids", "name": "BabyBus Kids: Play &amp; Learn", "developer": "games, role-playing games, cooking games, pet games, and learning games; watch exciting animated videos, function stringify(v){
try{
if(typeof v === "string") return v;
return JSON.stringify(v,null,2);
}catch(e){
return String(v);
}
}

function searchData(query){
query=query.toLowerCase();

for(const item of DATA){
const text=(item.name+" "+stringify(item.content)).toLowerCase();

if(query.split(" ").some(word=>word.length>2 && text.includes(word))){
const result=stringify(item.content);
return `📁 ${item.name}\n\n${result.slice(0,1500)}`;
}
}

return "Data tidak ditemukan di JSON.";
}
