<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6dfa;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --user-bg: #1e1b3a;
    --user-border: rgba(124,109,250,0.3);
    --ai-bg: #13131c;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #setup-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 440px;
  }

  .setup-logo {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .setup-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .setup-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 7px;
  }

  .setup-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }

  .setup-input:focus { border-color: var(--accent); }
  .setup-input::placeholder { color: var(--muted); }

  .model-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .model-option {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .model-option:hover { border-color: rgba(124,109,250,0.3); }

  .model-option.selected {
    border-color: var(--accent);
    background: rgba(124,109,250,0.1);
  }

  .model-option input { display: none; }

  .model-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }

  .model-desc {
    font-size: 11px;
    color: var(--muted);
  }

  .setup-hint {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .setup-hint a { color: var(--accent2); text-decoration: none; }

  .btn-start {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    padding: 13px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-start:hover { opacity: 0.88; }
  .btn-start:active { transform: scale(0.98); }

  #setup-error {
    background: rgba(220,60,60,0.1);
    border: 1px solid rgba(220,60,60,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: #f87171;
    margin-bottom: 14px;
    display: none;
  }

  #chat-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
  }
  #chat-screen.active { display: flex; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .topbar-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--accent2);
  }

  .model-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--muted);
  }

  .btn-sm {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-sm:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 800px;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { margin-left: auto; flex-direction: row-reverse; }

  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 9px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
  }
  .avatar.ai { background: linear-gradient(135deg, var(--accent), #c084fc); color: #fff; }
  .avatar.user { background: var(--user-bg); border: 1px solid var(--user-border); color: var(--accent2); }

  .bubble {
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.7;
    max-width: calc(100% - 42px);
  }
  .msg.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid var(--user-border);
    border-top-right-radius: 4px;
  }

  .bubble pre {
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: monospace;
  }
  .bubble code {
    background: rgba(124,109,250,0.15);
    padding: 2px 5px;
    border-radius: 4px;
    font-size: 12px;
    font-family: monospace;
    color: var(--accent2);
  }
  .bubble pre code { background: none; padding: 0; color: var(--text); }

  .typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 40px;
    text-align: center;
  }
  .empty-icon { font-size: 36px; opacity: 0.25; margin-bottom: 6px; }
  .empty-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); opacity: 0.55; }
  .empty-sub { font-size: 13px; color: var(--muted); }

  .input-area {
    padding: 12px 20px 20px;
    background: var(--bg);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: rgba(124,109,250,0.4); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 140px;
    overflow-y: auto;
    line-height: 1.6;
    padding: 3px 0;
  }
  #user-input::placeholder { color: var(--muted); }

  .btn-send {
    width: 34px;
    height: 34px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-send:hover { opacity: 0.85; }
  .btn-send:active { transform: scale(0.93); }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-send svg { width: 14px; height: 14px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .char-hint { text-align: center; font-size: 11px; color: var(--muted); margin-top: 6px; opacity: 0.5; }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-logo">✦ AI Chat</div>
    <p class="setup-sub">Powered by Groq API — super cepat. Masukkan API key lo dari <a href="https://console.groq.com/keys" target="_blank">console.groq.com</a>.</p>

    <div class="setup-label">Groq API Key</div>
    <input type="password" id="api-key-input" class="setup-input" placeholder="gsk_..." />

    <div class="setup-label">Pilih Model</div>
    <div class="model-grid" id="model-grid">
      <label class="model-option selected">
        <input type="radio" name="model" value="llama-3.3-70b-versatile" checked>
        <div class="model-name">Llama 3.3 70B</div>
        <div class="model-desc">Pintar & serbaguna</div>
      </label>
      <label class="model-option">
        <input type="radio" name="model" value="llama-3.1-8b-instant">
        <div class="model-name">Llama 3.1 8B</div>
        <div class="model-desc">Paling cepat</div>
      </label>
      <label class="model-option">
        <input type="radio" name="model" value="gemma2-9b-it">
        <div class="model-name">Gemma 2 9B</div>
        <div class="model-desc">Google, efisien</div>
      </label>
      <label class="model-option">
        <input type="radio" name="model" value="mixtral-8x7b-32768">
        <div class="model-name">Mixtral 8x7B</div>
        <div class="model-desc">Konteks panjang</div>
      </label>
    </div>

    <div class="setup-label">Nama Bot (opsional)</div>
    <input type="text" id="bot-name-input" class="setup-input" placeholder="AI Chat" />

    <div class="setup-label">System Prompt (opsional)</div>
    <textarea id="system-prompt-input" class="setup-input" rows="3" placeholder="Kamu adalah asisten yang membantu dan ramah. Jawab dalam Bahasa Indonesia." style="resize:vertical;min-height:66px;"></textarea>

    <div id="setup-error"></div>
    <button class="btn-start" onclick="startChat()">Mulai Chat →</button>
  </div>
</div>

<div id="chat-screen">
  <div class="topbar">
    <div class="topbar-title" id="topbar-name">✦ AI Chat</div>
    <div style="display:flex;gap:7px;align-items:center;">
      <div class="model-badge" id="model-badge">llama-3.3-70b</div>
      <button class="btn-sm" onclick="resetChat()">Reset</button>
      <button class="btn-sm" onclick="changeKey()">Ganti Key</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">◈</div>
      <div class="empty-title">Siap ngobrol</div>
      <div class="empty-sub">Ketik pesan lo di bawah untuk mulai</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="user-input" placeholder="Ketik pesan..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="char-hint">Enter kirim · Shift+Enter baris baru</div>
  </div>
</div>

<script>
let apiKey = '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'; // ganti dengan gsk_xxxx lo
let systemPrompt = '';
let selectedModel = 'llama-3.3-70b-versatile';
let messages = [];
let isLoading = false;

// Model option click
document.querySelectorAll('.model-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.model-option').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    selectedModel = opt.querySelector('input').value;
  });
});

function startChat() {
  const key = document.getElementById('api-key-input').value.trim();
  const name = document.getElementById('bot-name-input').value.trim() || 'AI Chat';
  const sys = document.getElementById('system-prompt-input').value.trim();
  const errEl = document.getElementById('setup-error');

  if (!key || !key.startsWith('gsk_')) {
    errEl.style.cssText = 'display:block;background:rgba(220,60,60,0.1);border:1px solid rgba(220,60,60,0.2);border-radius:10px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:14px;';
    errEl.textContent = 'API key tidak valid. Groq key dimulai dengan "gsk_"';
    return;
  }

  errEl.style.display = 'none';
  apiKey = key;
  systemPrompt = sys || 'Kamu adalah asisten AI yang membantu, cerdas, dan ramah. Jawab dalam Bahasa Indonesia kecuali jika diminta lain.';

  document.getElementById('topbar-name').textContent = '✦ ' + name;
  document.getElementById('model-badge').textContent = selectedModel.split('-').slice(0,3).join('-');
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('chat-screen').classList.add('active');
  document.getElementById('user-input').focus();
}

function changeKey() {
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('chat-screen').classList.remove('active');
}

function resetChat() {
  messages = [];
  document.getElementById('messages').innerHTML = `
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">◈</div>
      <div class="empty-title">Siap ngobrol</div>
      <div class="empty-sub">Ketik pesan lo di bawah untuk mulai</div>
    </div>`;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatMessage(text) {
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) => `<pre><code>${escapeHtml(c.trim())}</code></pre>`);
  text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function appendMessage(role, content) {
  const container = document.getElementById('messages');
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="avatar ${role}">${role === 'ai' ? '✦' : 'U'}</div>
    <div class="bubble">${formatMessage(content)}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('messages');
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typing-indicator';
  div.innerHTML = `<div class="avatar ai">✦</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = ''; input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  messages.push({ role: 'user', content: text });
  appendMessage('user', text);
  showTyping();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: selectedModel,
        max_tokens: 2048,
        messages: [
          { role: 'system', content: systemPrompt },
          ...messages
        ]
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || `Error ${res.status}`);

    const reply = data.choices[0].message.content;
    messages.push({ role: 'assistant', content: reply });
    removeTyping();
    appendMessage('ai', reply);

  } catch (err) {
    removeTyping();
    appendMessage('ai', `⚠️ **Error:** ${err.message}`);
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('user-input').focus();
}
</script>
</body>
</html>
